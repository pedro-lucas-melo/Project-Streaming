<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .categories {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #222;
            border-radius: 12px;
            padding: 2.5rem 3rem;
            text-decoration: none;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            transition: background 0.2s, transform 0.2s;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .card:hover {
            background: #444;
            transform: scale(1.05);
            cursor: pointer;
        }

        .card .icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>

<h1>🍿Streaming</h1>

<p style="color:#aaa; margin-bottom:2rem; font-size:0.95rem;">
    Olá, <strong style="color:white">{{ profile.name }}</strong> —
    <a href="/profiles/exit" style="color:#aaa; text-decoration:underline;">Trocar perfil</a>
</p>

<div class="categories">
    <a class="card" href="/series-list">
        <span class="icon">🎬</span>
        Séries
    </a>
    <a class="card" href="/movies">
        <span class="icon">🎥</span>
        Filmes
    </a>
</div>

</body>
</html>
