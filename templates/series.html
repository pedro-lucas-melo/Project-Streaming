<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>{{ series }}</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .card {
            background: #222;
            padding: 28px 24px;
            border-radius: 10px;
            width: 260px;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .card:hover { background: #444; transform: scale(1.05); cursor: pointer; }
        .card:focus { background: #444; transform: scale(1.08); outline: none; box-shadow: 0 0 0 3px #e50914; }

        .voltar {
            display: inline-block;
            background: #333;
            color: white;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 36px;
            transition: background 0.15s, transform 0.15s;
        }
        .voltar:hover { background: #555; }
        .voltar:focus { background: #555; outline: none; transform: scale(1.05); box-shadow: 0 0 0 3px #e50914; }

        a {
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body tabindex="0">

<h1>{{ series }}</h1>

<div class="grid">
    {% for season in seasons %}
        <a href="/season?series={{ series }}&season={{ season }}">
            <div class="card" {% if loop.first %}autofocus{% endif %}>
                {{ season }}
            </div>
        </a>
    {% endfor %}
</div>

<br>
<a class="voltar" href="/">← Voltar</a>

<script>
(function() {
    function getFocusable() {
        return Array.prototype.slice.call(document.querySelectorAll('.card, .voltar'))
            .filter(function(el) { return el.offsetParent !== null; });
    }
    function nearest(items, cur, dir) {
        var cr = cur.getBoundingClientRect(), best = null, bestScore = Infinity;
        items.forEach(function(el) {
            if (el === cur) return;
            var r = el.getBoundingClientRect();
            var ok = dir==="down"?r.top>=cr.bottom-5:dir==="up"?r.bottom<=cr.top+5:dir==="right"?r.left>=cr.right-5:r.right<=cr.left+5;
            if (!ok) return;
            var cx=r.left+r.width/2, cy=r.top+r.height/2, mx=cr.left+cr.width/2, my=cr.top+cr.height/2;
            var primary=dir==="down"?r.top-cr.bottom:dir==="up"?cr.top-r.bottom:dir==="right"?r.left-cr.right:cr.left-r.right;
            var score=primary+((dir==="down"||dir==="up")?Math.abs(cx-mx):Math.abs(cy-my))*0.5;
            if (score < bestScore) { bestScore=score; best=el; }
        });
        return best;
    }
    var all = getFocusable();
    all.forEach(function(el){ if(!el.getAttribute("tabindex")) el.setAttribute("tabindex","0"); });
    if (all.length) setTimeout(function(){ all[0].focus(); }, 100);

    document.addEventListener("keydown", function(e) {
        var kc = e.keyCode || e.which;
        if (kc===10009||e.key==="XF86Back") { e.preventDefault(); window.location.href="/series-list"; return; }
        var items = getFocusable(), active = document.activeElement;
        if (items.indexOf(active) === -1) { if (kc===37||kc===38||kc===39||kc===40) { e.preventDefault(); items[0]&&items[0].focus(); } return; }
        if (kc===13||e.key==="Enter") {
            e.preventDefault();
            var a = active.querySelector("a")||active.closest("a"); if (a) a.click(); else active.click();
            return;
        }
        var dir=kc===39?"right":kc===37?"left":kc===40?"down":kc===38?"up":null;
        if (!dir) return;
        e.preventDefault();
        var next = nearest(items, active, dir);
        if (next) next.focus();
    });
})();
</script>
</body>
</html>
