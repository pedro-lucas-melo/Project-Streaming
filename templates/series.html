<!DOCTYPE html>
<html>
<head>
    <title>{{ series }}</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .card {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            transition: 0.2s;
        }

        .card:hover {
            background: #444;
            transform: scale(1.05);
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: white;
        }

        .voltar {
            display: inline-block;
            margin-top: 30px;
            color: #aaa;
        }
    </style>
</head>
<body tabindex="0">

<h1>{{ series }}</h1>

<div class="grid">
    {% for season in seasons %}
        <a href="/season?series={{ series }}&season={{ season }}">
            <div class="card" {% if loop.first %}autofocus{% endif %}>
                {{ season }}
            </div>
        </a>
    {% endfor %}
</div>

<br>
<a class="voltar" href="/">← Voltar</a>

</body>
</html>
