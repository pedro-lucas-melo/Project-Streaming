<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e50914">
    <link rel="manifest" href="/static/manifest.json">
    <title>Séries</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            padding: 30px 0 20px;
            font-size: 1.8rem;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px 30px 50px;
        }

        .card {
            width: 160px;
            border-radius: 8px;
            overflow: hidden;
            background: #1e1e1e;
            transition: transform 0.15s, background 0.15s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover { transform: scale(1.05); background: #2a2a2a; }
        .card:focus { transform: scale(1.08); background: #2a2a2a; outline: none; }

        .poster {
            width: 160px;
            height: 240px;
            object-fit: cover;
            background: #333;
            display: block;
        }

        .poster-placeholder {
            width: 160px;
            height: 240px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .card-title {
            padding: 10px 10px 4px;
            font-size: 0.85rem;
            color: #ddd;
            text-align: center;
            line-height: 1.3;
        }

        .wl-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.75);
            border: none;
            color: white;
            font-size: 18px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.15s, box-shadow 0.15s;
            z-index: 10;
            padding: 0;
        }
        .wl-btn:focus { opacity: 1; outline: none; box-shadow: 0 0 0 2px #4caf50; background: rgba(30,100,30,0.9); }
        .wl-btn.in-wl { color: #4caf50; opacity: 0.8; }

        .voltar {
            display: block;
            width: fit-content;
            margin: 0 auto 30px;
            background: #333;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.15s, transform 0.15s;
        }
        .voltar:hover { background: #555; }
        .voltar:focus { background: #555; outline: none; transform: scale(1.05); box-shadow: 0 0 0 3px #e50914; }
        .wl-btn:focus { color: white; outline: none; box-shadow: 0 0 0 2px #e50914; border-radius: 4px; }

        .suggest-fab {
            position: fixed; bottom: 24px; right: 24px;
            background: #e50914; color: white; border: none;
            border-radius: 50px; padding: 12px 20px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
            z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transition: background 0.15s, transform 0.15s;
        }
        .suggest-fab:hover { background: #c0070f; transform: scale(1.05); }
        .suggest-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 200;
            align-items: center; justify-content: center;
        }
        .suggest-modal-overlay.show { display: flex; }
        .suggest-modal-box {
            background: #1a1a1a; border-radius: 16px; padding: 2rem;
            width: 90%; max-width: 480px; max-height: 85vh; overflow-y: auto;
        }
        .suggest-modal-box h3 { font-size: 1.2rem; margin-bottom: 1.2rem; }
        .suggest-search-row { display: flex; margin-bottom: 1rem; }
        .suggest-search-btn { margin-left: 8px; }
        .suggest-input {
            flex: 1; background: #333; border: 1px solid #555; color: white;
            padding: 10px 14px; border-radius: 8px; font-size: 0.95rem;
        }
        .suggest-input:focus { outline: none; border-color: #e50914; }
        .suggest-search-btn {
            background: #e50914; color: white; border: none;
            border-radius: 8px; padding: 10px 18px; cursor: pointer; font-weight: bold;
        }
        .suggest-results { display: flex; flex-direction: column; margin-top: 0.5rem; }
        .suggest-result-item {
            display: flex; align-items: center; margin-bottom: 10px;
            background: #2a2a2a; border-radius: 10px; padding: 10px;
            cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s;
        }
        .suggest-result-item:hover { border-color: #e50914; }
        .suggest-result-item.selected { border-color: #e50914; background: #3a1a1a; }
        .suggest-result-poster { width: 48px; height: 72px; object-fit: cover; border-radius: 6px; flex-shrink: 0; margin-right: 12px; }
        .suggest-result-poster-ph {
            width: 48px; height: 72px; background: #333; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; margin-right: 12px;
        }
        .suggest-result-info { flex: 1; }
        .suggest-result-title { font-weight: bold; font-size: 0.9rem; }
        .suggest-result-meta { font-size: 0.78rem; color: #aaa; margin-top: 3px; }
        .suggest-send-row { margin-top: 1.2rem; display: flex; justify-content: flex-end; }
        .suggest-send-row > * + * { margin-left: 8px; }
        .suggest-status { font-size: 0.82rem; color: #aaa; margin-top: 0.5rem; text-align: center; }
        .modal-btn { padding: 10px 24px; border-radius: 8px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
        .modal-btn.confirm { background: #e50914; color: white; }
        .modal-btn.confirm:hover { background: #c0070f; }
        .modal-btn.cancel { background: #444; color: white; }
        .modal-btn.cancel:hover { background: #555; }
    </style>
</head>
<body>

<h1>🎬 Séries</h1>

<div class="grid">
    {% for s in series %}
    <div class="card" style="text-decoration:none;">
        <a href="/series?name={{ s.name }}" style="display:block;text-decoration:none;color:inherit;">
            {% if s.poster_url %}
            <img class="poster" src="{{ s.poster_url }}" alt="{{ s.name }}" loading="lazy">
            {% else %}
            <div class="poster-placeholder">🎬</div>
            {% endif %}
            <div class="card-title">{{ s.name }}</div>
        </a>
        <button class="wl-btn {% if s.in_watchlist %}in-wl{% endif %}"
            data-key="{{ s.name | e }}"
            data-title="{{ s.name | e }}"
            data-poster="{{ s.poster_url | e }}"
            data-type="tv"
            data-link="/series?name={{ s.encoded_name | e }}"
            onclick="toggleWatchlist(this)">
            {% if s.in_watchlist %}✓{% else %}+{% endif %}
        </button>
    </div>
    {% endfor %}
</div>

<a class="voltar" href="/">← Voltar</a>

<button class="suggest-fab" onclick="openSuggestModal()">💡 Sugestão</button>
<div class="suggest-modal-overlay" id="suggestModal">
    <div class="suggest-modal-box">
        <h3>💡 Sugerir título</h3>
        <div class="suggest-search-row">
            <input class="suggest-input" id="suggestInput" type="text" placeholder="Nome do filme ou série..." autocomplete="off">
            <button class="suggest-search-btn" onclick="doSuggestSearch()">Buscar</button>
        </div>
        <div class="suggest-results" id="suggestResults"></div>
        <div class="suggest-status" id="suggestStatus"></div>
        <div class="suggest-send-row">
            <button class="modal-btn confirm" id="suggestSendBtn" style="display:none" onclick="sendSuggestion()">Enviar pelo WhatsApp</button>
            <button class="modal-btn cancel" onclick="closeSuggestModal()">Fechar</button>
        </div>
    </div>
</div>

<script>
async function toggleWatchlist(btn) {
    var inWl = btn.classList.contains("in-wl");
    var key = btn.dataset.key;
    if (inWl) {
        var r = await fetch("/api/watchlist?" + new URLSearchParams({ media_key: key }), { method: "DELETE" });
        if (r.ok) { btn.classList.remove("in-wl"); btn.textContent = "+"; }
    } else {
        var poster = btn.dataset.poster;
        if (poster === "None" || poster === "") poster = null;
        var res = await fetch("/api/watchlist", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ media_key: key, title: btn.dataset.title, poster_url: poster, media_type: btn.dataset.type, link_url: btn.dataset.link }),
        });
        if (res.ok) {
            btn.classList.add("in-wl");
            btn.textContent = "✓";
        } else {
            btn.textContent = "⚠ Erro " + res.status;
        }
    }
}

if ("serviceWorker" in navigator) navigator.serviceWorker.register("/static/sw.js");
(function() {
    function getFocusable() {
        return Array.prototype.slice.call(document.querySelectorAll('.card, .wl-btn, .voltar'))
            .filter(function(el) { return el.offsetParent !== null && !el.closest('.suggest-modal-overlay.show'); });
    }
    function nearest(items, cur, dir) {
        var cr = cur.getBoundingClientRect();
        var best = null, bestScore = Infinity;
        items.forEach(function(el) {
            if (el === cur) return;
            var r = el.getBoundingClientRect();
            var ok = dir==="down"  ? r.top    >= cr.bottom - 5 :
                     dir==="up"    ? r.bottom <= cr.top    + 5 :
                     dir==="right" ? r.left   >= cr.right  - 5 :
                                     r.right  <= cr.left   + 5;
            if (!ok) return;
            var cx = r.left+r.width/2, cy = r.top+r.height/2;
            var mx = cr.left+cr.width/2, my = cr.top+cr.height/2;
            var primary = dir==="down"?r.top-cr.bottom:dir==="up"?cr.top-r.bottom:dir==="right"?r.left-cr.right:cr.left-r.right;
            var score = primary + ((dir==="down"||dir==="up")?Math.abs(cx-mx):Math.abs(cy-my))*0.5;
            if (score < bestScore) { bestScore = score; best = el; }
        });
        return best;
    }
    function activate(el) {
        if (el.tagName==="BUTTON") { el.click(); return; }
        var a = el.querySelector("a"); if (a) { a.click(); return; }
        el.click();
    }
    document.addEventListener("keydown", function(e) {
        if (["INPUT","TEXTAREA","SELECT"].indexOf(document.activeElement.tagName) !== -1) return;
        var kc = e.keyCode || e.which;
        if (kc===10009||e.key==="XF86Back") { e.preventDefault(); window.location.href="/"; return; }
        var items = getFocusable();
        if (!items.length) return;
        var active = document.activeElement;
        if (items.indexOf(active) === -1) {
            if (kc===37||kc===38||kc===39||kc===40) { e.preventDefault(); items[0].focus(); }
            return;
        }
        if (kc===13||e.key==="Enter") { e.preventDefault(); activate(active); return; }
        var dir = kc===39?"right":kc===37?"left":kc===40?"down":kc===38?"up":null;
        if (!dir) return;
        e.preventDefault();
        // Down de .card → wl-btn interno
        if (dir==="down" && active.classList.contains("card")) {
            var wb = active.querySelector(".wl-btn"); if (wb) { wb.focus(); return; }
        }
        // Qualquer seta de .wl-btn: Up/Left/Right → card pai; Down → spatial nav
        if (active.classList.contains("wl-btn")) {
            if (dir!=="down") { var pc = active.closest(".card"); if (pc) { pc.focus(); return; } }
        }
        var next = nearest(items, active, dir);
        if (next) next.focus();
    });
    var all = getFocusable();
    all.forEach(function(el){ if(!el.getAttribute("tabindex")) el.setAttribute("tabindex","0"); });
    if (all.length) setTimeout(function(){ all[0].focus(); }, 100);
})();

let _selectedSuggestion = null;
function openSuggestModal() { document.getElementById("suggestModal").classList.add("show"); document.getElementById("suggestInput").focus(); }
function closeSuggestModal() {
    document.getElementById("suggestModal").classList.remove("show");
    document.getElementById("suggestResults").innerHTML = "";
    document.getElementById("suggestStatus").textContent = "";
    document.getElementById("suggestInput").value = "";
    document.getElementById("suggestSendBtn").style.display = "none";
    _selectedSuggestion = null;
}
document.getElementById("suggestModal").addEventListener("click", (e) => { if (e.target === e.currentTarget) closeSuggestModal(); });
document.getElementById("suggestInput").addEventListener("keydown", (e) => { if (e.key === "Enter") doSuggestSearch(); });
async function doSuggestSearch() {
    const q = document.getElementById("suggestInput").value.trim();
    if (!q) return;
    document.getElementById("suggestStatus").textContent = "Buscando…";
    document.getElementById("suggestResults").innerHTML = "";
    document.getElementById("suggestSendBtn").style.display = "none";
    _selectedSuggestion = null;
    const res = await fetch("/api/tmdb-search?" + new URLSearchParams({ q }));
    const items = await res.json();
    document.getElementById("suggestStatus").textContent = "";
    if (!items.length) { document.getElementById("suggestStatus").textContent = "Nenhum resultado encontrado."; return; }
    document.getElementById("suggestResults").innerHTML = items.map((item, i) => `
        <div class="suggest-result-item" id="sr-${i}" onclick="selectSuggestion(${i})">
            ${item.poster_url ? `<img class="suggest-result-poster" src="${item.poster_url}" alt="">` : `<div class="suggest-result-poster-ph">${item.media_type === "movie" ? "🎥" : "🎬"}</div>`}
            <div class="suggest-result-info">
                <div class="suggest-result-title">${item.title}</div>
                <div class="suggest-result-meta">${item.media_type === "movie" ? "Filme" : "Série"}${item.year ? " · " + item.year : ""}</div>
            </div>
        </div>`).join("");
    window._suggestItems = items;
}
function selectSuggestion(i) {
    document.querySelectorAll(".suggest-result-item").forEach(el => el.classList.remove("selected"));
    document.getElementById("sr-" + i).classList.add("selected");
    _selectedSuggestion = window._suggestItems[i];
    document.getElementById("suggestSendBtn").style.display = "";
}
async function sendSuggestion() {
    if (!_selectedSuggestion) return;
    const { title, tmdb_url, media_type, year } = _selectedSuggestion;
    const sendBtn = document.getElementById("suggestSendBtn");
    sendBtn.disabled = true;
    sendBtn.textContent = "Enviando…";
    try {
        const res = await fetch("/api/suggest", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, tmdb_url, media_type, year }),
        });
        if (res.ok) {
            document.getElementById("suggestStatus").textContent = "✅ Sugestão enviada!";
            setTimeout(closeSuggestModal, 1500);
        } else {
            document.getElementById("suggestStatus").textContent = "❌ Erro ao enviar. Tente novamente.";
            sendBtn.disabled = false;
            sendBtn.textContent = "Enviar pelo WhatsApp";
        }
    } catch (err) {
        document.getElementById("suggestStatus").textContent = "❌ Sem conexão com o servidor.";
        sendBtn.disabled = false;
        sendBtn.textContent = "Enviar pelo WhatsApp";
    }
}
</script>
</body>
</html>
