<!DOCTYPE html>
<html>
<head>
    <title>Streaming</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            width: 200px;
            padding: 20px;
            background: #222;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }

        .card:hover {
            background: #333;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<h1>🎬 Séries</h1>

<div class="grid">
    {% for s in series %}
        <a class="card" href="/series?name={{ s }}">
            {{ s }}
        </a>
    {% endfor %}
</div>

</body>
</html>
