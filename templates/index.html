<!DOCTYPE html>
<html>
<head>
    <title>Streaming</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1, h2 {
            margin-top: 20px;
        }

        .season {
            margin: 30px 0;
        }

        .episode {
            width: 400px;
            margin: 10px auto;
        }

        .card {
            display: block;
            padding: 15px;
            background: #222;
            border-radius: 8px;
            transition: 0.2s;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            background: #333;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<h1>🎬 Meu Streaming</h1>

{% for series, seasons in structure.items() %}
    <h2>{{ series }}</h2>

    {% for season, episodes in seasons.items() %}
        <div class="season">
            <h3>{{ season }}</h3>

            {% for ep in episodes %}
                <div class="episode">
                    <a class="card" href="/watch?path={{ ep.path }}">
                        {{ ep.name }}
                    </a>
                </div>
            {% endfor %}
        </div>
    {% endfor %}
{% endfor %}

</body>
</html>
