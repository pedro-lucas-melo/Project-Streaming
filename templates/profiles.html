<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem está assistindo?</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 3rem;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .profiles {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .profile-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .avatar {
            width: 180px;
            height: 72px;
            border-radius: 8px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            transition: border-color 0.15s, transform 0.15s, background 0.15s;
        }

        .profile-btn:hover .avatar,
        .profile-btn:focus .avatar {
            border-color: white;
            background: #444;
            transform: scale(1.05);
        }

        .profile-btn:focus { outline: none; }

        .name {
            color: #ddd;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<h1>Quem está assistindo?</h1>

<div class="profiles">
    {% for p in profiles %}
    <form method="POST" action="/profiles/select">
        <input type="hidden" name="profile_id" value="{{ p.id }}">
        <button class="profile-btn" type="submit">
            <div class="avatar">
                <span class="name">{{ p.name }}</span>
            </div>
        </button>
    </form>
    {% endfor %}
</div>

<script>
(function() {
    var btns = Array.prototype.slice.call(document.querySelectorAll(".profile-btn"));
    btns.forEach(function(b) { b.setAttribute("tabindex", "0"); });
    if (btns.length) btns[0].focus();

    document.addEventListener("keydown", function(e) {
        var c = e.keyCode || e.which;
        var idx = btns.indexOf(document.activeElement);
        if (idx === -1) { if (c === 39 || c === 37 || c === 40 || c === 38) { e.preventDefault(); btns[0].focus(); } return; }
        if (c === 39 || c === 40) { e.preventDefault(); if (idx + 1 < btns.length) btns[idx + 1].focus(); }
        else if (c === 37 || c === 38) { e.preventDefault(); if (idx - 1 >= 0) btns[idx - 1].focus(); }
        else if (c === 13) { e.preventDefault(); btns[idx].closest("form").submit(); }
    });
})();
</script>
</body>
</html>
