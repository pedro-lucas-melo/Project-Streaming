<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>{{ season }}</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .lista {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
        }

        .card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            width: 500px;
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            background: #444;
            transform: scale(1.02);
        }

        .voltar {
            display: inline-block;
            margin-top: 30px;
            color: #aaa;
            text-decoration: none;
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #overlay.ativo {
            display: flex;
        }

        #overlay video {
            width: 100%;
            height: 100%;
        }

        #fechar {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10000;
            color: white;
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>{{ series }} — {{ season }}</h1>

<div class="lista">
    {% for ep in episodes %}
        <div class="card" data-path="{{ ep.path }}">
            {{ ep.name }}
        </div>
    {% endfor %}
</div>

<br>
<a class="voltar" href="/series?name={{ series }}">← Voltar</a>

<div id="overlay">
    <button id="fechar">← Voltar</button>
    <video id="video" controls autoplay>
        <source id="video-src" src="">
    </video>
</div>

<script>
    document.querySelectorAll(".card").forEach(function(card) {
        card.addEventListener("click", function() {
            const path = this.dataset.path;
            const overlay = document.getElementById("overlay");
            const video = document.getElementById("video");
            const src = document.getElementById("video-src");

            src.src = "/video?path=" + encodeURIComponent(path);
            video.load();
            overlay.classList.add("ativo");

            overlay.requestFullscreen().catch(function() {});
        });
    });

    document.getElementById("fechar").addEventListener("click", function() {
        const overlay = document.getElementById("overlay");
        const video = document.getElementById("video");

        if (document.fullscreenElement) {
            document.exitFullscreen();
        }

        video.pause();
        video.src = "";
        overlay.classList.remove("ativo");
    });
</script>

</body>
</html>
