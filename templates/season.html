<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>{{ season }}</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .lista {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
        }

        .card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            width: 500px;
            transition: 0.2s;
        }

        .card:hover {
            background: #444;
            transform: scale(1.02);
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: white;
        }

        .voltar {
            display: inline-block;
            margin-top: 30px;
            color: #aaa;
        }
    </style>
</head>
<body tabindex="0">

<h1>{{ series }} — {{ season }}</h1>

<div class="lista">
    {% for ep in episodes %}
        <a href="/watch?path={{ ep.path }}">
            <div class="card" {% if loop.first %}autofocus{% endif %}>
                {{ ep.name }}
            </div>
        </a>
    {% endfor %}
</div>

<br>
<a class="voltar" href="/series?name={{ series }}">← Voltar</a>

</body>
</html>
