<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }

        /* ─────────────────────────────
           CONTROLES
        ───────────────────────────── */
        #controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;

            padding: 0 28px 24px;

            background: linear-gradient(
                to top,
                rgba(0,0,0,0.92),
                rgba(0,0,0,0.45),
                transparent
            );

            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }

        #controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ─────────────────────────────
           BARRA DE PROGRESSO
        ───────────────────────────── */
        #progress-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 18px;
        }

        #progress-container {
            position: relative;
            width: 100%;
            height: 8px;

            background: rgba(255,255,255,0.18);
            border-radius: 999px;

            overflow: hidden;

            cursor: pointer;

            transition: height 0.15s ease;
        }

        #progress-container:hover {
            height: 10px;
        }

        #progress-fill {
            height: 100%;
            width: 0%;

            background: #e50914;

            border-radius: 999px;
            transition: width 0.08s linear;
        }

        /* Preview de tempo */
        #progress-tooltip {
            position: absolute;
            bottom: 22px;

            transform: translateX(-50%);

            background: rgba(0,0,0,0.85);

            color: white;

            padding: 5px 8px;

            border-radius: 6px;

            font-size: 12px;

            white-space: nowrap;

            opacity: 0;
            pointer-events: none;

            transition: opacity 0.12s ease;
        }

        #progress-tooltip.show {
            opacity: 1;
        }

        /* ─────────────────────────────
           CONTROLES
        ───────────────────────────── */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .time-display {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
        }

        .title-display {
            flex: 1;

            color: rgba(255,255,255,0.75);

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: white;

            font-size: 20px;

            cursor: pointer;

            opacity: 0.9;

            transition:
                transform 0.15s ease,
                opacity 0.15s ease;
        }

        .icon-btn:hover {
            opacity: 1;
            transform: scale(1.08);
        }

        /* ─────────────────────────────
           VOLTAR
        ───────────────────────────── */
        #back-top {
            position: absolute;
            top: 22px;
            left: 22px;

            z-index: 20;

            color: white;
            text-decoration: none;

            font-size: 18px;

            opacity: 0;
            pointer-events: none;

            transition: opacity 0.25s ease;
        }

        #back-top.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ─────────────────────────────
           SEEK OVERLAY
        ───────────────────────────── */
        #seek-overlay {
            position: absolute;
            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            gap: 10px;

            opacity: 0;
            transition: opacity 0.15s ease;

            pointer-events: none;
        }

        #seek-overlay.show {
            opacity: 1;
        }

        .seek-arrows {
            font-size: 60px;
            line-height: 1;

            text-shadow: 0 2px 12px rgba(0,0,0,0.6);
        }

        .seek-seconds {
            font-size: 24px;
            font-weight: bold;

            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }

        /* ─────────────────────────────
           PLAY/PAUSE
        ───────────────────────────── */
        #playpause-icon {
            position: absolute;
            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            font-size: 72px;

            opacity: 0;
            pointer-events: none;

            text-shadow: 0 2px 16px rgba(0,0,0,0.6);
        }

        #playpause-icon.show {
            animation: iconAnim 0.5s ease forwards;
        }

        @keyframes iconAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.12);
            }

            70% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
        }

        /* ─────────────────────────────
           LOADING
        ───────────────────────────── */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            font-size: 16px;

            color: rgba(255,255,255,0.85);

            display: none;
        }

        #loading.show {
            display: block;
        }

        /* ─────────────────────────────
           MOBILE
        ───────────────────────────── */
        @media (max-width: 768px) {

            .seek-arrows {
                font-size: 48px;
            }

            .seek-seconds {
                font-size: 20px;
            }

            #playpause-icon {
                font-size: 58px;
            }

            .controls-row {
                gap: 12px;
            }
        }
    </style>
</head>

<body>

<a id="back-top" href="javascript:history.back()">← Voltar</a>

<div class="container">

    <video id="video" autoplay>
        <source src="/video?path={{ path }}">
    </video>

    <!-- Loading -->
    <div id="loading">Carregando...</div>

    <!-- Overlay seek -->
    <div id="seek-overlay">
        <div class="seek-arrows" id="seek-arrows">»»</div>
        <div class="seek-seconds" id="seek-seconds">+10 segundos</div>
    </div>

    <!-- Play/Pause -->
    <div id="playpause-icon">⏸</div>

    <!-- Controls -->
    <div id="controls">

        <div id="progress-wrapper">

            <div id="progress-tooltip">0:00</div>

            <div id="progress-container">
                <div id="progress-fill"></div>
            </div>

        </div>

        <div class="controls-row">

            <span class="time-display" id="time-display">
                0:00 / 0:00
            </span>

            <span class="title-display">
                Reprodução
            </span>

            <button class="icon-btn" id="fullscreen-btn" title="Tela cheia">
                ⛶
            </button>

        </div>

    </div>

</div>

<script>
window.addEventListener("load", () => {

    const video             = document.getElementById("video");
    const controls          = document.getElementById("controls");
    const backTop           = document.getElementById("back-top");

    const progressContainer = document.getElementById("progress-container");
    const progressFill      = document.getElementById("progress-fill");
    const progressTooltip   = document.getElementById("progress-tooltip");

    const timeDisplay       = document.getElementById("time-display");

    const seekOverlay       = document.getElementById("seek-overlay");
    const seekArrows        = document.getElementById("seek-arrows");
    const seekSeconds       = document.getElementById("seek-seconds");

    const playpauseIcon     = document.getElementById("playpause-icon");

    const fullscreenBtn     = document.getElementById("fullscreen-btn");

    const loading           = document.getElementById("loading");

    let hideControlsTimer;
    let seekOverlayTimer;

    let isDragging = false;

    /* ─────────────────────────────
       FULLSCREEN
    ───────────────────────────── */
    function goFullscreen() {

        const el = document.documentElement;

        if (document.fullscreenElement) return;

        if (el.requestFullscreen) {
            el.requestFullscreen();
        }
        else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        }
    }

    try {
        goFullscreen();
    }
    catch {
        document.addEventListener("click", goFullscreen, { once: true });
    }

    fullscreenBtn.addEventListener("click", goFullscreen);

    /* ─────────────────────────────
       FORMATA TEMPO
    ───────────────────────────── */
    function formatTime(seconds) {

        seconds = Math.floor(seconds);

        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;

        if (h > 0) {
            return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        }

        return `${m}:${String(s).padStart(2, "0")}`;
    }

    /* ─────────────────────────────
       CONTROLES
    ───────────────────────────── */
    function showControls() {

        controls.classList.add("visible");
        backTop.classList.add("visible");

        clearTimeout(hideControlsTimer);

        hideControlsTimer = setTimeout(() => {

            if (!isDragging) {
                controls.classList.remove("visible");
                backTop.classList.remove("visible");
            }

        }, 3500);
    }

    document.addEventListener("mousemove", showControls);
    document.addEventListener("click", showControls);

    /* ─────────────────────────────
       PROGRESSO
    ───────────────────────────── */
    video.addEventListener("timeupdate", () => {

        if (!video.duration || isDragging) return;

        const percent =
            (video.currentTime / video.duration) * 100;

        progressFill.style.width = percent + "%";

        timeDisplay.textContent =
            `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    });

    /* ─────────────────────────────
       SEEK
    ───────────────────────────── */
    function showSeekOverlay(seconds) {

        if (seconds < 0) {
            seekArrows.innerHTML = "&#8249;&#8249;";
            seekSeconds.textContent = "−10 segundos";
        }
        else {
            seekArrows.innerHTML = "&#8250;&#8250;";
            seekSeconds.textContent = "+10 segundos";
        }

        seekOverlay.classList.add("show");

        clearTimeout(seekOverlayTimer);

        seekOverlayTimer = setTimeout(() => {
            seekOverlay.classList.remove("show");
        }, 500);
    }

    function seekVideo(seconds) {

        if (!video.duration) return;

        const target =
            Math.min(
                Math.max(video.currentTime + seconds, 0),
                video.duration
            );

        video.currentTime = target;

        showSeekOverlay(seconds);
    }

    /* ─────────────────────────────
       PLAY / PAUSE
    ───────────────────────────── */
    function showPlayPauseIcon(isPlaying) {

        playpauseIcon.textContent =
            isPlaying ? "⏸" : "▶";

        playpauseIcon.classList.remove("show");

        void playpauseIcon.offsetWidth;

        playpauseIcon.classList.add("show");
    }

    function togglePlayPause() {

        if (video.paused) {
            video.play();
            showPlayPauseIcon(true);
        }
        else {
            video.pause();
            showPlayPauseIcon(false);
        }
    }

    /* ─────────────────────────────
       LOADING
    ───────────────────────────── */
    video.addEventListener("waiting", () => {
        loading.classList.add("show");
    });

    video.addEventListener("playing", () => {
        loading.classList.remove("show");
    });

    /* ─────────────────────────────
       BARRA CLICÁVEL + DRAG
    ───────────────────────────── */
    function updateSeekPosition(clientX) {

        const rect = progressContainer.getBoundingClientRect();

        let percent =
            (clientX - rect.left) / rect.width;

        percent = Math.max(0, Math.min(percent, 1));

        progressFill.style.width =
            (percent * 100) + "%";

        const newTime =
            percent * video.duration;

        timeDisplay.textContent =
            `${formatTime(newTime)} / ${formatTime(video.duration)}`;

        progressTooltip.textContent =
            formatTime(newTime);

        progressTooltip.style.left =
            (percent * rect.width) + "px";

        video.currentTime = newTime;
    }

    progressContainer.addEventListener("mousedown", (e) => {

        if (!video.duration) return;

        isDragging = true;

        showControls();

        updateSeekPosition(e.clientX);
    });

    document.addEventListener("mousemove", (e) => {

        const rect = progressContainer.getBoundingClientRect();

        let percent =
            (e.clientX - rect.left) / rect.width;

        percent = Math.max(0, Math.min(percent, 1));

        const hoverTime =
            percent * video.duration;

        progressTooltip.textContent =
            formatTime(hoverTime);

        progressTooltip.style.left =
            (percent * rect.width) + "px";

        progressTooltip.classList.add("show");

        if (isDragging) {
            updateSeekPosition(e.clientX);
        }
    });

    document.addEventListener("mouseup", () => {
        isDragging = false;
    });

    progressContainer.addEventListener("mouseleave", () => {

        if (!isDragging) {
            progressTooltip.classList.remove("show");
        }
    });

    /* ─────────────────────────────
       TECLADO
    ───────────────────────────── */
    document.addEventListener("keydown", (e) => {

        switch (e.key) {

            case "ArrowLeft":

                e.preventDefault();

                seekVideo(-10);

                showControls();

                break;

            case "ArrowRight":

                e.preventDefault();

                seekVideo(10);

                showControls();

                break;

            case "Enter":
            case " ":

                e.preventDefault();

                togglePlayPause();

                break;

            case "Escape":
            case "Backspace":

                e.preventDefault();

                history.back();

                break;

            case "ArrowUp":
            case "ArrowDown":

                e.preventDefault();

                showControls();

                break;

            case "f":
            case "F":

                e.preventDefault();

                goFullscreen();

                break;
        }
    });

    /* ─────────────────────────────
       CLIQUE NO VÍDEO
    ───────────────────────────── */
    video.addEventListener("click", togglePlayPause);

    /* ─────────────────────────────
       START
    ───────────────────────────── */
    showControls();

});
</script>

</body>
</html>
