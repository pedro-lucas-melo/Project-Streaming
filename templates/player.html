<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;

            display: flex;
            align-items: center;
            justify-content: center;

            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            background: black;
        }

        /* ─────────────────────────────
           BOTÃO VOLTAR
        ───────────────────────────── */
        .back {
            position: absolute;
            top: 20px;
            left: 20px;

            z-index: 20;

            opacity: 0;

            transition: opacity 0.2s ease;
        }

        .back.show {
            opacity: 1;
        }

        .back a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        /* ─────────────────────────────
           OVERLAY SEEK
        ───────────────────────────── */
        .overlay {
            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            background: rgba(0,0,0,0.45);

            color: white;

            padding: 12px 18px;

            border-radius: 10px;

            font-size: 28px;
            font-weight: bold;

            opacity: 0;

            transition: opacity 0.15s ease;

            pointer-events: none;
        }

        .overlay.show {
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="back" id="backButton">
        <a href="javascript:history.back()">← Voltar</a>
    </div>

    <video
        id="video"
        controls
        autoplay
    >
        <source src="/video?path={{ path }}">
    </video>

    <div class="overlay" id="overlay">
        +10s
    </div>

</div>

<script>
window.addEventListener("load", () => {

    const video =
        document.getElementById("video");

    const overlay =
        document.getElementById("overlay");

    const backButton =
        document.getElementById("backButton");

    let overlayTimer;
    let controlsTimer;

    /* ─────────────────────────────
       FULLSCREEN
    ───────────────────────────── */
    function fullscreen() {

        if (
            document.fullscreenElement ||
            document.webkitFullscreenElement
        ) {
            return;
        }

        if (video.requestFullscreen) {
            video.requestFullscreen();
        }
        else if (video.webkitRequestFullscreen) {
            video.webkitRequestFullscreen();
        }
    }

    /* ─────────────────────────────
       OVERLAY
    ───────────────────────────── */
    function showOverlay(text) {

        overlay.textContent = text;

        overlay.classList.add("show");

        clearTimeout(overlayTimer);

        overlayTimer = setTimeout(() => {

            overlay.classList.remove("show");

        }, 350);
    }

    /* ─────────────────────────────
       MOSTRA BOTÃO VOLTAR
    ───────────────────────────── */
    function showBackButton() {

        backButton.classList.add("show");

        clearTimeout(controlsTimer);

        controlsTimer = setTimeout(() => {

            backButton.classList.remove("show");

        }, 2500);
    }

    document.addEventListener(
        "mousemove",
        showBackButton
    );

    document.addEventListener(
        "click",
        showBackButton
    );

    /* ─────────────────────────────
       SEEK
    ───────────────────────────── */
    function seek(seconds) {

        if (!video.duration) return;

        video.currentTime =
            Math.min(
                Math.max(
                    video.currentTime + seconds,
                    0
                ),
                video.duration
            );

        showOverlay(
            seconds > 0 ? "+10s" : "-10s"
        );
    }

    /* ─────────────────────────────
       TECLADO / CONTROLE REMOTO
    ───────────────────────────── */
    document.addEventListener(
        "keydown",
        (e) => {

            switch (e.key) {

                case "ArrowLeft":

                    e.preventDefault();

                    seek(-10);

                    break;

                case "ArrowRight":

                    e.preventDefault();

                    seek(10);

                    break;

                case "f":
                case "F":

                    e.preventDefault();

                    fullscreen();

                    break;

                case "Escape":
                case "Backspace":

                    e.preventDefault();

                    history.back();

                    break;
            }
        }
    );

});
</script>

</body>
</html>
