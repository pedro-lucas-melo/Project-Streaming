<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;

            display: flex;
            align-items: center;
            justify-content: center;

            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }

        /* ─────────────────────────────
           CONTROLES
        ───────────────────────────── */
        #controls {
            position: absolute;

            left: 0;
            right: 0;
            bottom: 0;

            padding: 0 25px 20px;

            background: linear-gradient(
                to top,
                rgba(0,0,0,0.9),
                rgba(0,0,0,0.4),
                transparent
            );

            opacity: 0;

            transition: opacity 0.2s ease;

            pointer-events: none;
        }

        #controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ─────────────────────────────
           BARRA DE PROGRESSO
        ───────────────────────────── */
        #progress-container {
            width: 100%;
            height: 6px;

            background: rgba(255,255,255,0.2);

            border-radius: 999px;

            overflow: hidden;

            cursor: pointer;

            margin-bottom: 16px;
        }

        #progress-fill {
            width: 0%;
            height: 100%;

            background: #e50914;

            border-radius: 999px;
        }

        /* ─────────────────────────────
           LINHA INFERIOR
        ───────────────────────────── */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .time-display {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
        }

        .title-display {
            flex: 1;

            color: rgba(255,255,255,0.75);

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon-btn {
            background: transparent;
            border: none;

            color: white;

            font-size: 20px;

            cursor: pointer;

            opacity: 0.9;

            transition: opacity 0.15s ease;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        /* ─────────────────────────────
           BOTÃO VOLTAR
        ───────────────────────────── */
        #back-top {
            position: absolute;

            top: 20px;
            left: 20px;

            z-index: 10;

            color: white;
            text-decoration: none;

            font-size: 18px;

            opacity: 0;

            transition: opacity 0.2s ease;

            pointer-events: none;
        }

        #back-top.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ─────────────────────────────
           OVERLAY SEEK
        ───────────────────────────── */
        #seek-overlay {
            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            font-size: 26px;
            font-weight: bold;

            color: white;

            background: rgba(0,0,0,0.45);

            padding: 12px 18px;

            border-radius: 10px;

            opacity: 0;

            transition: opacity 0.15s ease;

            pointer-events: none;
        }

        #seek-overlay.show {
            opacity: 1;
        }

        /* ─────────────────────────────
           PLAY/PAUSE ICON
        ───────────────────────────── */
        #playpause-icon {
            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            font-size: 72px;

            opacity: 0;

            pointer-events: none;

            transition: opacity 0.2s ease;
        }

        #playpause-icon.show {
            opacity: 1;
        }

        /* ─────────────────────────────
           MOBILE
        ───────────────────────────── */
        @media (max-width: 768px) {

            .controls-row {
                gap: 12px;
            }

            #playpause-icon {
                font-size: 56px;
            }

            #seek-overlay {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

<a id="back-top" href="javascript:history.back()">← Voltar</a>

<div class="container">

    <video id="video" autoplay>
        <source src="/video?path={{ path }}">
    </video>

    <!-- Overlay de seek -->
    <div id="seek-overlay">+10s</div>

    <!-- Ícone play/pause -->
    <div id="playpause-icon">⏸</div>

    <!-- Controles -->
    <div id="controls">

        <div id="progress-container">
            <div id="progress-fill"></div>
        </div>

        <div class="controls-row">

            <span class="time-display" id="time-display">
                0:00 / 0:00
            </span>

            <span class="title-display">
                Reprodução
            </span>

            <button class="icon-btn" id="fullscreen-btn">
                ⛶
            </button>

        </div>

    </div>

</div>

<script>
window.addEventListener("load", () => {

    const video             = document.getElementById("video");

    const controls          = document.getElementById("controls");
    const backTop           = document.getElementById("back-top");

    const progressContainer = document.getElementById("progress-container");
    const progressFill      = document.getElementById("progress-fill");

    const timeDisplay       = document.getElementById("time-display");

    const fullscreenBtn     = document.getElementById("fullscreen-btn");

    const seekOverlay       = document.getElementById("seek-overlay");

    const playpauseIcon     = document.getElementById("playpause-icon");

    let hideControlsTimer;
    let seekTimer;

    /* ─────────────────────────────
       FULLSCREEN
    ───────────────────────────── */
    function goFullscreen() {

        if (document.fullscreenElement) return;

        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }
        else if (document.documentElement.webkitRequestFullscreen) {
            document.documentElement.webkitRequestFullscreen();
        }
    }

    try {
        goFullscreen();
    }
    catch {
        document.addEventListener("click", goFullscreen, { once: true });
    }

    fullscreenBtn.addEventListener("click", goFullscreen);

    /* ─────────────────────────────
       FORMATA TEMPO
    ───────────────────────────── */
    function formatTime(seconds) {

        seconds = Math.floor(seconds);

        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;

        if (h > 0) {
            return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        }

        return `${m}:${String(s).padStart(2, "0")}`;
    }

    /* ─────────────────────────────
       CONTROLES
    ───────────────────────────── */
    function showControls() {

        controls.classList.add("visible");
        backTop.classList.add("visible");

        clearTimeout(hideControlsTimer);

        hideControlsTimer = setTimeout(() => {

            controls.classList.remove("visible");
            backTop.classList.remove("visible");

        }, 3000);
    }

    document.addEventListener("mousemove", showControls);
    document.addEventListener("click", showControls);

    /* ─────────────────────────────
       PROGRESSO
    ───────────────────────────── */
    video.addEventListener("timeupdate", () => {

        if (!video.duration) return;

        const percent =
            (video.currentTime / video.duration) * 100;

        progressFill.style.width = percent + "%";

        timeDisplay.textContent =
            `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    });

    /* ─────────────────────────────
       SEEK SIMPLES
    ───────────────────────────── */
    function showSeek(text) {

        seekOverlay.textContent = text;

        seekOverlay.classList.add("show");

        clearTimeout(seekTimer);

        seekTimer = setTimeout(() => {
            seekOverlay.classList.remove("show");
        }, 450);
    }

    function seek(seconds) {

        if (!video.duration) return;

        video.currentTime =
            Math.min(
                Math.max(video.currentTime + seconds, 0),
                video.duration
            );

        showSeek(seconds > 0 ? "+10s" : "-10s");
    }

    /* ─────────────────────────────
       BARRA CLICÁVEL
    ───────────────────────────── */
    progressContainer.addEventListener("click", (e) => {

        if (!video.duration) return;

        const rect =
            progressContainer.getBoundingClientRect();

        const percent =
            (e.clientX - rect.left) / rect.width;

        video.currentTime =
            percent * video.duration;
    });

    /* ─────────────────────────────
       PLAY / PAUSE
    ───────────────────────────── */
    function showPlayPauseIcon(isPlaying) {

        playpauseIcon.textContent =
            isPlaying ? "⏸" : "▶";

        playpauseIcon.classList.add("show");

        setTimeout(() => {
            playpauseIcon.classList.remove("show");
        }, 300);
    }

    function togglePlayPause() {

        if (video.paused) {

            video.play();

            showPlayPauseIcon(true);
        }
        else {

            video.pause();

            showPlayPauseIcon(false);
        }
    }

    video.addEventListener("click", togglePlayPause);

    /* ─────────────────────────────
       TECLADO
    ───────────────────────────── */
    document.addEventListener("keydown", (e) => {

        switch (e.key) {

            case "ArrowLeft":

                e.preventDefault();

                seek(-10);

                showControls();

                break;

            case "ArrowRight":

                e.preventDefault();

                seek(10);

                showControls();

                break;

            case "Enter":
            case " ":

                e.preventDefault();

                togglePlayPause();

                break;

            case "Escape":
            case "Backspace":

                e.preventDefault();

                history.back();

                break;

            case "ArrowUp":
            case "ArrowDown":

                e.preventDefault();

                showControls();

                break;

            case "f":
            case "F":

                e.preventDefault();

                goFullscreen();

                break;
        }
    });

    /* ─────────────────────────────
       START
    ───────────────────────────── */
    showControls();

});
</script>

</body>
</html>
