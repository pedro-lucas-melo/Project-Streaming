<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;

            display: flex;
            align-items: center;
            justify-content: center;

            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }

        /* ─────────────────────────────
           VOLTAR
        ───────────────────────────── */
        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .back a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        /* ─────────────────────────────
           CONTROLES
        ───────────────────────────── */
        .controls {
            position: absolute;

            left: 0;
            right: 0;
            bottom: 0;

            padding: 0 20px 18px;

            background: linear-gradient(
                to top,
                rgba(0,0,0,0.85),
                transparent
            );

            opacity: 0;

            transition: opacity 0.2s ease;
        }

        .controls.show {
            opacity: 1;
        }

        /* ─────────────────────────────
           BARRA
        ───────────────────────────── */
        .progress-container {
            width: 100%;
            height: 5px;

            background: rgba(255,255,255,0.25);

            border-radius: 999px;

            overflow: hidden;

            cursor: pointer;

            margin-bottom: 12px;
        }

        .progress {
            width: 0%;
            height: 100%;

            background: #e50914;
        }

        /* ─────────────────────────────
           LINHA INFERIOR
        ───────────────────────────── */
        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;

            color: white;

            font-size: 14px;
        }

        .fullscreen-btn {
            background: none;
            border: none;

            color: white;

            font-size: 20px;

            cursor: pointer;
        }

        /* ─────────────────────────────
           OVERLAY SEEK
        ───────────────────────────── */
        .seek-overlay {
            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            color: white;

            font-size: 28px;
            font-weight: bold;

            background: rgba(0,0,0,0.45);

            padding: 10px 18px;

            border-radius: 10px;

            opacity: 0;

            transition: opacity 0.15s ease;

            pointer-events: none;
        }

        .seek-overlay.show {
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="back">
        <a href="javascript:history.back()">← Voltar</a>
    </div>

    <video id="video" autoplay>
        <source src="/video?path={{ path }}">
    </video>

    <div class="seek-overlay" id="seekOverlay">
        +10s
    </div>

    <div class="controls" id="controls">

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="bottom-row">

            <div id="time">
                0:00 / 0:00
            </div>

            <button class="fullscreen-btn" id="fullscreenBtn">
                ⛶
            </button>

        </div>

    </div>

</div>

<script>
window.addEventListener("load", () => {

    const video = document.getElementById("video");

    const controls = document.getElementById("controls");

    const progress = document.getElementById("progress");

    const progressContainer =
        document.getElementById("progressContainer");

    const time = document.getElementById("time");

    const fullscreenBtn =
        document.getElementById("fullscreenBtn");

    const seekOverlay =
        document.getElementById("seekOverlay");

    let controlsTimer;
    let seekTimer;

    /* ─────────────────────────────
       FULLSCREEN
    ───────────────────────────── */
    function fullscreen() {

        if (document.fullscreenElement) return;

        if (video.requestFullscreen) {
            video.requestFullscreen();
        }
        else if (video.webkitRequestFullscreen) {
            video.webkitRequestFullscreen();
        }
    }

    try {
        fullscreen();
    }
    catch {
        document.addEventListener(
            "click",
            fullscreen,
            { once: true }
        );
    }

    fullscreenBtn.addEventListener(
        "click",
        fullscreen
    );

    /* ─────────────────────────────
       FORMATA TEMPO
    ───────────────────────────── */
    function format(seconds) {

        seconds = Math.floor(seconds);

        const h = Math.floor(seconds / 3600);

        const m =
            Math.floor((seconds % 3600) / 60);

        const s = seconds % 60;

        if (h > 0) {

            return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
        }

        return `${m}:${String(s).padStart(2,"0")}`;
    }

    /* ─────────────────────────────
       MOSTRA CONTROLES
    ───────────────────────────── */
    function showControls() {

        controls.classList.add("show");

        clearTimeout(controlsTimer);

        controlsTimer = setTimeout(() => {

            controls.classList.remove("show");

        }, 2500);
    }

    document.addEventListener(
        "mousemove",
        showControls
    );

    document.addEventListener(
        "click",
        showControls
    );

    /* ─────────────────────────────
       PROGRESSO
    ───────────────────────────── */
    video.addEventListener(
        "timeupdate",
        () => {

            if (!video.duration) return;

            const percent =
                (video.currentTime / video.duration) * 100;

            progress.style.width =
                percent + "%";

            time.textContent =
                `${format(video.currentTime)} / ${format(video.duration)}`;
        }
    );

    /* ─────────────────────────────
       SEEK
    ───────────────────────────── */
    function showSeek(text) {

        seekOverlay.textContent = text;

        seekOverlay.classList.add("show");

        clearTimeout(seekTimer);

        seekTimer = setTimeout(() => {

            seekOverlay.classList.remove("show");

        }, 350);
    }

    function seek(seconds) {

        if (!video.duration) return;

        video.currentTime =
            Math.min(
                Math.max(
                    video.currentTime + seconds,
                    0
                ),
                video.duration
            );

        showSeek(seconds > 0 ? "+10s" : "-10s");
    }

    /* ─────────────────────────────
       BARRA CLICÁVEL
    ───────────────────────────── */
    progressContainer.addEventListener(
        "click",
        (e) => {

            if (!video.duration) return;

            const rect =
                progressContainer.getBoundingClientRect();

            const percent =
                (e.clientX - rect.left) / rect.width;

            video.currentTime =
                percent * video.duration;
        }
    );

    /* ─────────────────────────────
       PLAY/PAUSE
    ───────────────────────────── */
    video.addEventListener(
        "click",
        () => {

            if (video.paused) {
                video.play();
            }
            else {
                video.pause();
            }
        }
    );

    /* ─────────────────────────────
       TECLADO
    ───────────────────────────── */
    document.addEventListener(
        "keydown",
        (e) => {

            switch (e.key) {

                case "ArrowLeft":

                    e.preventDefault();

                    seek(-10);

                    showControls();

                    break;

                case "ArrowRight":

                    e.preventDefault();

                    seek(10);

                    showControls();

                    break;

                case " ":
                case "Enter":

                    e.preventDefault();

                    if (video.paused) {
                        video.play();
                    }
                    else {
                        video.pause();
                    }

                    break;

                case "f":
                case "F":

                    e.preventDefault();

                    fullscreen();

                    break;

                case "Escape":
                case "Backspace":

                    e.preventDefault();

                    history.back();

                    break;
            }
        }
    );

    showControls();

});
</script>

</body>
</html>
