<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            color: white;
            font-family: Arial;
            overflow: hidden; /* 🚫 remove scroll */
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .back a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<div class="back">
    <a href="javascript:history.back()">← Voltar</a>
</div>

<div class="container">
    <video controls autoplay>
        <source src="/video?path={{ path }}">
    </video>
</div>

<script>
    const video = document.querySelector("video");

    video.addEventListener("play", function handler() {
        if (video.requestFullscreen) {
            video.requestFullscreen();
        } else if (video.webkitRequestFullscreen) {
            video.webkitRequestFullscreen();
        }
        video.removeEventListener("play", handler); // dispara só uma vez
    });
</script>

</body>
</html>
