<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body.hide-cursor,
        body.hide-cursor * { cursor: none !important; }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            background: black;
        }

        /* ── OVERLAY ── */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.55);
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 28px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
            z-index: 30;
        }

        .overlay.show { opacity: 1; }

        /* ── TÍTULO (topo) ── */
        .title-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 22px 28px;
            background: linear-gradient(rgba(0,0,0,0.7), transparent);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            z-index: 25;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .title-bar.show { opacity: 1; }

        /* ── BARRA DE CONTROLES ── */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            z-index: 25;
            opacity: 0;
            transition: opacity 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .controls.show { opacity: 1; }

        /* ── BARRA DE PROGRESSO ── */
        .progress-wrapper {
            width: 100%;
            height: 24px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
            pointer-events: none;
            transition: height 0.1s;
        }

        .progress-wrapper:hover .progress-track { height: 6px; }

        .progress-bar {
            height: 100%;
            background: #e50914;
            border-radius: 3px;
            width: 0%;
        }

        /* ── BOTÕES ── */
        .btn-row {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .ctrl-btn + .ctrl-btn { margin-left: 10px; }

        .ctrl-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .ctrl-btn:hover,
        .ctrl-btn:focus {
            background: rgba(255,255,255,0.2);
            outline: none;
        }

        .time-display {
            color: rgba(255,255,255,0.85);
            font-size: 18px;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ── SPINNER ── */
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.2s;
        }

        .spinner.show { opacity: 1; }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* ── PAINEL DE AVALIAÇÃO ── DESABILITADO (remover comentário para reativar)
        .rating-panel {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            border-radius: 16px;
            padding: 18px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            white-space: nowrap;
        }
        .rating-panel.show { opacity: 1; pointer-events: auto; }
        .rating-panel p { font-size: 0.9rem; color: #ccc; }
        .rating-btns { display: flex; gap: 12px; }
        .rating-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            color: white;
        }
        .rating-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .rating-btn.active { border-color: #e50914; background: rgba(229,9,20,0.25); }
        .rating-dismiss { font-size: 0.75rem; color: #666; cursor: pointer; }
        .rating-dismiss:hover { color: #aaa; }
        ── FIM AVALIAÇÃO */
    </style>
</head>

<body>
<div class="container">

    <video id="video" autoplay data-resume="{{ resume_position }}">
        <source src="/video?path={{ encoded_path }}">
    </video>

    <div class="spinner" id="spinner"></div>
    <div class="overlay" id="overlay"></div>
    <div class="title-bar" id="titleBar">{{ display_title }}</div>

    <!-- AVALIAÇÃO DESABILITADA — remover comentário para reativar
    <div class="rating-panel" id="ratingPanel">
        <p>O que achou?</p>
        <div class="rating-btns">
            <button class="rating-btn {% if current_rating == 'love' %}active{% endif %}" id="rateLove"    title="Adorei"     onclick="rate('love')">❤️</button>
            <button class="rating-btn {% if current_rating == 'like' %}active{% endif %}" id="rateLike"    title="Gostei"     onclick="rate('like')">👍</button>
            <button class="rating-btn {% if current_rating == 'dislike' %}active{% endif %}" id="rateDislike" title="Não gostei" onclick="rate('dislike')">👎</button>
        </div>
        <span class="rating-dismiss" onclick="hideRatingPanel()">Fechar</span>
    </div>
    FIM AVALIAÇÃO -->

    <div class="controls" id="controls">
        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        <div class="btn-row">
            <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">▶</button>
            <button class="ctrl-btn" id="backwardBtn"  title="Voltar 10s">⏪ 10s</button>
            <button class="ctrl-btn" id="forwardBtn"   title="Avançar 10s">10s ⏩</button>
            <button class="ctrl-btn" id="muteBtn"      title="Mudo">🔊</button>
            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        </div>
    </div>

</div>

<script>
(function () {
    const FILE_PATH = new URLSearchParams(location.search).get("path");

    const video           = document.getElementById("video");
    const overlay         = document.getElementById("overlay");
    const controls        = document.getElementById("controls");
    const progressWrapper = document.getElementById("progressWrapper");
    const progressBar     = document.getElementById("progressBar");
    const playPauseBtn    = document.getElementById("playPauseBtn");
    const backwardBtn     = document.getElementById("backwardBtn");
    const forwardBtn      = document.getElementById("forwardBtn");
    const muteBtn         = document.getElementById("muteBtn");
    const timeDisplay     = document.getElementById("timeDisplay");
    const spinner         = document.getElementById("spinner");
    const titleBar        = document.getElementById("titleBar");

    let overlayTimer;
    let controlsTimer;

    // ── OVERLAY ─────────────────────────────────────────────────────────────
    function showOverlay(text) {
        overlay.textContent = text;
        overlay.classList.add("show");
        clearTimeout(overlayTimer);
        overlayTimer = setTimeout(() => overlay.classList.remove("show"), 500);
    }

    // ── CONTROLES ───────────────────────────────────────────────────────────
    function showControls() {
        controls.classList.add("show");
        titleBar.classList.add("show");
        document.body.classList.remove("hide-cursor");
        clearTimeout(controlsTimer);
        controlsTimer = setTimeout(() => {
            if (!video.paused) {
                controls.classList.remove("show");
                titleBar.classList.remove("show");
                document.body.classList.add("hide-cursor");
            }
        }, 3000);
    }

    // Auto-fullscreen ao iniciar
    function tryFullscreen() {
        var el = document.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullscreen;
        if (req) req.call(el).catch(function(){});
    }

    document.addEventListener("mousemove", showControls);
    document.addEventListener("click", showControls);
    document.addEventListener("touchstart", showControls, { passive: true });

    // ── PLAY / PAUSE ────────────────────────────────────────────────────────
    function togglePlay() {
        if (video.paused) {
            video.play();
            showOverlay("▶");
        } else {
            video.pause();
            showOverlay("⏸");
        }
    }

    video.addEventListener("play",  () => { playPauseBtn.textContent = "⏸"; showControls(); });
    video.addEventListener("pause", () => { playPauseBtn.textContent = "▶"; showControls(); });

    playPauseBtn.addEventListener("click", (e) => { e.stopPropagation(); togglePlay(); });

    video.addEventListener("click", togglePlay);

    // ── SEEK ────────────────────────────────────────────────────────────────
    function seek(seconds) {
        if (!video.duration) return;
        _resumeDone = true;  // usuário assumiu o controle — não restaurar mais a posição salva
        video.currentTime = Math.max(0, Math.min(video.currentTime + seconds, video.duration));
        showOverlay(seconds > 0 ? `+${seconds}s` : `${seconds}s`);
    }

    backwardBtn.addEventListener("click", (e) => { e.stopPropagation(); seek(-10); });
    forwardBtn.addEventListener("click",  (e) => { e.stopPropagation(); seek(10); });

    // ── PROGRESSO ───────────────────────────────────────────────────────────
    video.addEventListener("timeupdate", () => {
        if (!video.duration) return;
        const pct = (video.currentTime / video.duration) * 100;
        progressBar.style.width = pct + "%";
        timeDisplay.textContent = fmt(video.currentTime) + " / " + fmt(video.duration);
        if (Math.floor(video.currentTime) % 5 === 0) {
            fetch("/api/progress", {
                method: "POST",
                credentials: "same-origin",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ path: FILE_PATH, position: video.currentTime, duration: video.duration }),
            });
        }
    });

    progressWrapper.addEventListener("click", (e) => {
        if (!video.duration) return;
        _resumeDone = true;  // usuário buscou na barra — não restaurar mais a posição salva
        const rect = progressWrapper.getBoundingClientRect();
        const pct  = (e.clientX - rect.left) / rect.width;
        video.currentTime = pct * video.duration;
        e.stopPropagation();
    });

    // ── RETOMAR PROGRESSO ───────────────────────────────────────────────────
    // Posição renderizada pelo servidor — sem async fetch, sem race condition na TV.
    var _resumePosition = parseFloat(video.dataset.resume || "0");
    // Restaura a posição salva UMA vez. Depois que chega lá (ou o usuário busca),
    // marca como concluído — senão o canplay disparado pelo próprio seek puxava
    // currentTime de volta pra posição salva, travando qualquer avanço/retrocesso.
    var _resumeDone = !(_resumePosition > 5);

    video.addEventListener("loadedmetadata", function() {
        if (!_resumeDone && _resumePosition < video.duration - 30) {
            video.currentTime = _resumePosition;
            showOverlay("▶ Retomando…");
        }
    });

    // TV/dispositivos lentos: seek pode ser ignorado antes de buffering suficiente.
    // Reaplica só até confirmar que chegou; aí encerra (não luta com seeks do usuário).
    video.addEventListener("canplay", function() {
        if (_resumeDone) return;
        if (Math.abs(video.currentTime - _resumePosition) > 3) {
            video.currentTime = _resumePosition;
        } else {
            _resumeDone = true;
        }
    });

    // ── AO TERMINAR ──────────────────────────────────────────────────────────
    // NEXT_PATH já vem URL-encoded do servidor (vazio p/ filmes e fim de série).
    const NEXT_PATH = "{{ next_encoded_path }}";
    let _advancing = false;

    async function onEnded() {
        if (_advancing) return;
        _advancing = true;
        // Remove o título/episódio atual do "Continuar assistindo".
        // Séries: o próximo episódio se registra sozinho ao tocar → atualiza o
        // card (remove o atual, adiciona o próximo) sem nunca duplicar.
        try {
            await fetch("/api/progress?" + new URLSearchParams({ path: FILE_PATH }), {
                method: "DELETE",
                credentials: "same-origin",
            });
        } catch (e) { /* segue mesmo sem rede */ }

        if (NEXT_PATH) {
            showOverlay("▶ Próximo episódio…");
            window.location.replace("/watch?path=" + NEXT_PATH);
        }
    }

    video.addEventListener("ended", onEnded);

    // ── MUDO ────────────────────────────────────────────────────────────────
    function toggleMute() {
        video.muted = !video.muted;
        muteBtn.textContent = video.muted ? "🔇" : "🔊";
        showOverlay(video.muted ? "🔇" : "🔊");
    }
    muteBtn.addEventListener("click", (e) => { e.stopPropagation(); toggleMute(); });

    video.addEventListener("play", tryFullscreen, { once: true });

    // ── SPINNER DE BUFFERING ─────────────────────────────────────────────────
    video.addEventListener("waiting", () => spinner.classList.add("show"));
    video.addEventListener("canplay", () => spinner.classList.remove("show"));
    video.addEventListener("playing", () => spinner.classList.remove("show"));

    // ── TECLADO ─────────────────────────────────────────────────────────────
    document.addEventListener("keydown", (e) => {
        if (["INPUT", "SELECT", "TEXTAREA"].includes(e.target.tagName)) return;
        const kc = e.keyCode || e.which;

        // Sempre mostra controles em qualquer tecla
        showControls();

        // Back (Samsung TV = 10009, teclado = Escape/Backspace)
        if (kc === 10009 || e.key === "XF86Back" || e.key === "Escape" || e.key === "Backspace") {
            e.preventDefault(); history.back(); return;
        }

        // OK/Enter → play/pause
        if (kc === 13 || e.key === "Enter") {
            e.preventDefault(); togglePlay(); return;
        }

        // Botões de mídia do controle remoto
        if (kc === 415 || e.key === "MediaPlay")       { e.preventDefault(); video.play();   showOverlay("▶"); return; }
        if (kc === 19  || e.key === "MediaPause")      { e.preventDefault(); video.pause();  showOverlay("⏸"); return; }
        if (kc === 10252|| e.key === "MediaPlayPause") { e.preventDefault(); togglePlay();   return; }
        if (kc === 417 || e.key === "MediaFastForward"){ e.preventDefault(); seek(30);       return; }
        if (kc === 412 || e.key === "MediaRewind")     { e.preventDefault(); seek(-30);      return; }

        switch (e.key) {
            case " ":
            case "k":
                e.preventDefault(); togglePlay(); break;
            case "ArrowRight":
                e.preventDefault(); seek(10); break;
            case "ArrowLeft":
                e.preventDefault(); seek(-10); break;
            case "ArrowUp":
                e.preventDefault();
                video.volume = Math.min(1, video.volume + 0.1);
                showOverlay("🔊 " + Math.round(video.volume * 100) + "%");
                break;
            case "ArrowDown":
                e.preventDefault();
                video.volume = Math.max(0, video.volume - 0.1);
                showOverlay("🔉 " + Math.round(video.volume * 100) + "%");
                break;
            case "m": case "M":
                e.preventDefault(); toggleMute(); break;
        }
    });

    /* ── AVALIAÇÃO DESABILITADA — remover comentário para reativar ────────────
    const MEDIA_KEY = "{{ media_key | e }}";

    function showRatingPanel() {
        document.getElementById("ratingPanel").classList.add("show");
    }

    video.addEventListener("ended", showRatingPanel);

    let _ratingShown = {{ 'true' if current_rating else 'false' }};
    video.addEventListener("timeupdate", () => {
        if (!_ratingShown && video.currentTime > 300) {
            _ratingShown = true;
            showRatingPanel();
        }
    });
    ── FIM AVALIAÇÃO ─────────────────────────────────────────────────────── */

    // ── HELPERS ─────────────────────────────────────────────────────────────
    function fmt(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        if (h > 0) return `${h}:${pad(m)}:${pad(sec)}`;
        return `${m}:${pad(sec)}`;
    }
    function pad(n) { return String(n).padStart(2, "0"); }

})();
</script>

<script>
function hideRatingPanel() {
    document.getElementById("ratingPanel").classList.remove("show");
}

    Object.values(btns).forEach(id => document.getElementById(id).classList.remove("active"));
    document.getElementById(btns[value]).classList.add("active");
    await fetch("/api/rating", {
        method: "POST",

        body: JSON.stringify({ media_key: MEDIA_KEY, rating: value }),
    });

FIM AVALIAÇÃO -->
</body>
</html>
