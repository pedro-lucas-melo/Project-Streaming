<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
p { color: #aaa; font-size: 1rem; margin-bottom: 2rem; }
input { background: #222; border: 2px solid #555; color: white; padding: 14px 20px; border-radius: 10px; font-size: 1.1rem; width: 320px; outline: none; }
input:focus { border-color: #e50914; }
.btn { background: #e50914; color: white; border: none; border-radius: 10px; padding: 16px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 1rem; display: block; width: 220px; outline: none; }
.btn:focus { background: #ff1a1a; border: 3px solid #fff; }
.btn.sec { background: #333; margin-top: 0.5rem; font-size: 1rem; padding: 12px 40px; }
.btn.sec:focus { background: #555; border: 3px solid #fff; }
#status { margin-top: 1.2rem; font-size: 1rem; min-height: 1.4rem; }
#status.err  { color: #ff4444; }
#status.wait { color: #aaa; }
#status.ok   { color: #44ff44; }
#disconnect  { display: none; }
</style>
</head>
<body>
<h1>Streaming</h1>
<p id="subtitle">Digite o endereco do servidor</p>
<input id="ip" type="text" placeholder="192.168.1.100:80" tabindex="1">
<button class="btn" id="btnConnect" tabindex="2">Conectar</button>
<button class="btn sec" id="btnDisconnect" tabindex="3">Trocar servidor</button>
<div id="status"></div>
<script>
var KEY_ENTER = 13;
var KEY_UP    = 38;
var KEY_DOWN  = 40;
var KEY_BACK  = 10009;

var inp     = document.getElementById("ip");
var btnC    = document.getElementById("btnConnect");
var btnD    = document.getElementById("btnDisconnect");
var status  = document.getElementById("status");
var subtitle = document.getElementById("subtitle");

var saved = "";
try { saved = localStorage.getItem("sv") || ""; } catch(e) {}

if (saved) {
    inp.value = saved;
    subtitle.textContent = "Reconectando ao servidor salvo...";
    btnD.style.display = "block";
    setTimeout(function() { go(); }, 800);
} else {
    inp.focus();
}

function setStatus(msg, cls) {
    status.textContent = msg;
    status.className = cls || "";
}

function go() {
    var v = inp.value.trim();
    if (!v) { inp.focus(); return; }
    if (v.indexOf("://") === -1) { v = "http://" + v; }

    setStatus("Conectando...", "wait");
    btnC.disabled = true;

    var xhr = new XMLHttpRequest();
    xhr.open("GET", v, true);
    xhr.timeout = 6000;
    xhr.onload = function() {
        setStatus("", "ok");
        try { localStorage.setItem("sv", inp.value.trim()); } catch(e) {}
        window.location.href = v;
    };
    xhr.onerror = function() {
        btnC.disabled = false;
        setStatus("Servidor indisponivel. Verifique o IP e se o servidor esta ligado.", "err");
        btnC.focus();
    };
    xhr.ontimeout = function() {
        btnC.disabled = false;
        setStatus("Timeout. Servidor nao responde em 6s.", "err");
        btnC.focus();
    };
    xhr.send();
}

function disconnect() {
    try { localStorage.removeItem("sv"); } catch(e) {}
    saved = "";
    inp.value = "";
    btnD.style.display = "none";
    subtitle.textContent = "Digite o endereco do servidor";
    setStatus("", "");
    inp.focus();
}

btnC.addEventListener("click", go);
btnD.addEventListener("click", disconnect);

inp.addEventListener("keydown", function(e) {
    var c = e.keyCode || e.which;
    if (c === KEY_ENTER) { e.preventDefault(); go(); }
    if (c === KEY_DOWN)  { e.preventDefault(); btnC.focus(); }
});

btnC.addEventListener("keydown", function(e) {
    var c = e.keyCode || e.which;
    if (c === KEY_UP)    { e.preventDefault(); inp.focus(); }
    if (c === KEY_DOWN)  { e.preventDefault(); if (btnD.style.display !== "none") btnD.focus(); }
    if (c === KEY_ENTER) { e.preventDefault(); go(); }
    if (c === KEY_BACK)  { e.preventDefault(); inp.focus(); }
});

btnD.addEventListener("keydown", function(e) {
    var c = e.keyCode || e.which;
    if (c === KEY_UP)    { e.preventDefault(); btnC.focus(); }
    if (c === KEY_ENTER) { e.preventDefault(); disconnect(); }
    if (c === KEY_BACK)  { e.preventDefault(); btnC.focus(); }
});

document.addEventListener("keydown", function(e) {
    var c = e.keyCode || e.which;
    if (c === KEY_BACK && document.activeElement === inp) {
        e.preventDefault();
        disconnect();
    }
});
</script>
</body>
</html>
